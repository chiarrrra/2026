<!DOCTYPE html>
<html lang="en">
<head>

	<title>Esempio 18: pseudo-random</title>
</head>
<body>
	<div></div>
	<script>
		let seed = 6

		function random() {
			const a = 5
			const b = 1
			const m = 16
			const x = (a * seed + b) % m
			seed = x
			return x / m
		}

		const el = document.querySelector("div")

		el.innerHTML += random() + "<br>"
